<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contact — Ecosystem (EN)</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="eco-container">
    <header class="eco-header">
      <div class="eco-brand"><div class="eco-logo"><img src="../images/Logo%20de%20ecosystem.png" alt="Ecosystem logo" style="max-width:64px;height:auto;display:block;margin:0"></div><div><strong>Ecosystem</strong><div style="font-size:0.9rem;color:var(--muted)">Synthesis project — English</div></div></div>
      <div class="eco-lang">
        <a href="../es/index.html">Castellano</a>
        <a href="../ca/index.html">Català</a>
      </div>
    </header>
    <nav class="eco-card eco-nav" style="margin-top:12px">
      <ul>
        <li style="display:inline;margin-right:12px"><a href="index.html">Home page</a></li>
        <li style="display:inline;margin-right:12px"><a href="about.html">About the NGO</a></li>
        <li style="display:inline;margin-right:12px"><a href="projects.html">Projects of the NGO</a></li>
        <li style="display:inline"><a href="contact.html">Contact</a></li>
      </ul>
    </nav>

    <main class="eco-card">
      <h1>Contact</h1>
      <p class="eco-lead">Fill the form below to get in touch with us.</p>

      <section class="eco-form">
        <form class="contact-form" action="#" method="post">
          <label for="name-en">Name</label>
          <input id="name-en" name="name" type="text" required placeholder="Your full name" aria-required="true">

          <label for="email-en">Email</label>
          <input id="email-en" name="email" type="email" required placeholder="name@example.com" aria-required="true">

          <label for="message-en">Message</label>
          <textarea id="message-en" name="message" rows="6" required placeholder="Write your message here..." aria-required="true"></textarea>

          <input id="hp-en" name="hp" type="text" class="hp-field" autocomplete="off" tabindex="-1" aria-hidden="true">
          <button type="submit">Send</button>
          <p class="form-success" role="status" hidden>Thanks — we received your message. We'll reply soon.</p>
        </form>
      </section>
      
    </main>

    <footer class="eco-footer">Back to <a href="../index.html">Home page</a> · © 2026 Ecosystem</footer>
  </div>
</body>
</html>
