<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contacte — Ecosystem (CA)</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="eco-container">
    <header class="eco-header">
      <div class="eco-brand"><div class="eco-logo"><img src="../images/Logo de ecosystem.png" alt="Ecosystem logo" style="max-width:64px;height:auto;display:block;margin:0"></div><div><strong>Ecosystem</strong><div style="font-size:0.9rem;color:var(--muted)">Projecte de sintesi — Català</div></div></div>
      <div class="eco-lang">
        <a href="../es/index.html">Castellano</a>
        <a href="../en/index.html">English</a>
      </div>
    </header>
    <nav class="eco-card eco-nav" style="margin-top:12px">
      <ul>
        <li style="display:inline;margin-right:12px"><a href="index.html">Pàgina d'inici</a></li>
        <li style="display:inline;margin-right:12px"><a href="sobre.html">Informació sobre l'ONG</a></li>
        <li style="display:inline;margin-right:12px"><a href="projectes.html">Projectes de la ONG</a></li>
        <li style="display:inline"><a href="contacte.html">Contacte</a></li>
      </ul>
    </nav>
    <main class="eco-card">
      <h1>Contacte</h1>
      <p class="eco-lead">Omple el següent formulari per contactar amb nosaltres.</p>
      <section class="eco-form">
        <form action="#" method="post">
          <label for="name-ca">Nom</label>
          <input id="name-ca" name="name" type="text" required>

          <label for="email-ca">Correu electrònic</label>
          <input id="email-ca" name="email" type="email" required>

          <label for="message-ca">Missatge</label>
          <textarea id="message-ca" name="message" rows="6" required></textarea>

          <button type="submit">Enviar</button>
        </form>
      </section>
    </main>
    <footer class="eco-footer">Tornar a <a href="../index.html">Pàgina d'inici</a> · © 2026 Ecosystem</footer>
  </div>
</body>
</html>
