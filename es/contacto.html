<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contacto — Ecosystem (ES)</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="eco-container">
    <header class="eco-header">
      <div class="eco-brand"><div class="eco-logo"><img src="../images/Logo%20de%20ecosystem.png" alt="Ecosystem logo" style="max-width:64px;height:auto;display:block;margin:0"></div><div><strong>Ecosystem</strong><div style="font-size:0.9rem;color:var(--muted)">Proyecto de sintesi — Versión castellano</div></div>
      <div class="eco-lang">
        <a href="../ca/index.html">Català</a>
        <a href="../en/index.html">English</a>
      </div>
    </header>
    <nav class="eco-card eco-nav" style="margin-top:12px">
      <ul>
        <li style="display:inline;margin-right:12px"><a href="index.html">Página de inicio</a></li>
        <li style="display:inline;margin-right:12px"><a href="sobre.html">Información sobre la ONG</a></li>
        <li style="display:inline;margin-right:12px"><a href="proyectos.html">Proyectos de la ONG</a></li>
        <li style="display:inline"><a href="contacto.html">Contacto</a></li>
      </ul>
    </nav>
    <main class="eco-card">
      <h1>Contacto</h1>
      <p class="eco-lead">Rellena el siguiente formulario para ponerte en contacto con nosotros.</p>
      <section class="eco-form">
        <form action="#" method="post">
          <label for="name-es">Nombre</label>
          <input id="name-es" name="name" type="text" required>
          <label for="email-es">Correo electrónico</label>
          <input id="email-es" name="email" type="email" required>
          <label for="message-es">Mensaje</label>
          <textarea id="message-es" name="message" rows="6" required></textarea>
          <button type="submit">Enviar</button>
        </form>
      </section>
    </main>
    <footer class="eco-footer">Volver a <a href="../index.html">Inicio</a> · © 2026 Ecosystem</footer>
  </div>
</body>
</html>
